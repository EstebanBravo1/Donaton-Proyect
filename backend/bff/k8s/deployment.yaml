apiVersion: apps/v1
kind: Deployment

metadata:
  name: bff


spec:

  replicas: 1


  selector:
    matchLabels:
      app: bff


  template:

    metadata:
      labels:
        app: bff


    spec:

      containers:

        - name: bff

          image: donaton-proyect-bff:latest
          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 8080