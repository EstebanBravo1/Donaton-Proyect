name: ms-user-ci

on:
  push:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew bootJar