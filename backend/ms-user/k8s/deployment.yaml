apiVersion: apps/v1
kind: Deployment

metadata:
  name: ms-user

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ms-user

  template:
    metadata:
      labels:
        app: ms-user

    spec:
      containers:
        - name: ms-user
          image: donaton-proyect-ms-user:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081